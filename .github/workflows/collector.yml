name: collector

# 每日排程 + 手動觸發：抓取→SQLite→彙總 JSON→commit 產物（供公開 GitHub Pages）。
on:
  schedule:
    - cron: '0 12 * * 1-5'   # 週一至五 12:00 UTC（20:00 台北，收盤後資料已備）
  workflow_dispatch:
    inputs:
      days:
        description: '回補最近幾個交易日'
        required: false
        default: '120'
      branches:
        description: '逗號分隔分點代碼 securities_trader_id（空=預設）'
        required: false
        default: ''
      watchlist:
        description: '逗號分隔追蹤股票代碼（空=預設）'
        required: false
        default: ''
      max_req:
        description: '每次執行抓取上限 (分點,日) 對數'
        required: false
        default: '2000'

permissions:
  contents: write         # commit 彙總 JSON 產物到 repo（供公開 Pages）；原始明細仍只在 cache

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # 鐵律：單次執行以 15 分鐘為上限
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # pandas<2 有 cp311 manylinux wheel，免編譯、裝得快
          cache: pip

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: .cache            # 原始明細 DB 只存在這裡，不進 repo
          key: branchdb-v1-${{ github.run_id }}
          restore-keys: |
            branchdb-v1-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}   # 需先於 repo 設定 secret
          MAX_REQ_PER_RUN: ${{ inputs.max_req || '2000' }}
        run: >
          python collector.py
          --days "${{ inputs.days || '120' }}"
          --branches "${{ inputs.branches }}"
          --watchlist "${{ inputs.watchlist }}"

      - name: Upload data JSON (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-data
          path: data/*.json
          if-no-files-found: warn

      - name: Commit 彙總 JSON 產物（供公開 Pages）
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --quiet --cached; then
            echo "彙總資料無變更，略過 commit"
          else
            git commit -m "chore(data): 每日更新彙總 JSON [skip ci]"
            git push
          fi
