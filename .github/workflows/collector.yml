name: collector

# 手動觸發：抓取→SQLite→JSON。Phase 7 再加每日 schedule cron 與產物 commit。
on:
  workflow_dispatch:
    inputs:
      days:
        description: '回補最近幾個交易日'
        required: false
        default: '120'
      branches:
        description: '逗號分隔分點代碼 securities_trader_id（空=預設）'
        required: false
        default: ''
      max_req:
        description: '每次執行抓取上限 (分點,日) 對數'
        required: false
        default: '2000'

permissions:
  contents: read          # Phase 1 只產 artifact，不 push（最小權限）

concurrency:
  group: collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15     # 鐵律：單次執行以 15 分鐘為上限
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # pandas<2 有 cp311 manylinux wheel，免編譯、裝得快
          cache: pip

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: .cache            # 原始明細 DB 只存在這裡，不進 repo
          key: branchdb-v1-${{ github.run_id }}
          restore-keys: |
            branchdb-v1-

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run collector
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}   # 需先於 repo 設定 secret
          MAX_REQ_PER_RUN: ${{ inputs.max_req }}
        run: python collector.py --days "${{ inputs.days }}" --branches "${{ inputs.branches }}"

      - name: Upload data JSON (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collector-data
          path: data/*.json
          if-no-files-found: warn
